spring.application.name=atlen-backend

# Database configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:atlendb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Support
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port
server.port=8083

# JWT Secrets (replace with env variables in production)
app.jwt.secret=aVeryLongSecretKeyForAtlenAppJwtTokenGeneration1234567890
app.jwt.expiration-ms=86400000
